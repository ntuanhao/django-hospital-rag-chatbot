<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital AI - Trợ lý Y tế</title>
    <style>
        :root {
            --primary-color: #007bff; /* Xanh bệnh viện */
            --bg-color: #f4f7f6;
            --chat-bg: #ffffff;
            --user-msg-bg: #007bff;
            --ai-msg-bg: #e9ecef;
            --text-color: #333;
            --border-color: #ddd;
            --card-bg: #f8f9fa;
        }
        body {
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 95vh;
            background-color: var(--chat-bg);
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            padding: 20px;
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-indicator {
            font-size: 0.8em;
            font-weight: normal;
            opacity: 0.9;
        }
        .chat-box {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: #fff;
        }
        .message {
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 75%;
            line-height: 1.5;
            position: relative;
            font-size: 0.95em;
        }
        .user-message {
            background-color: var(--user-msg-bg);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .ai-message {
            background-color: var(--ai-msg-bg);
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid var(--border-color);
            background-color: #f9f9f9;
        }
        #userInput {
            flex-grow: 1;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 25px;
            font-size: 1em;
            outline: none;
            transition: border 0.3s;
        }
        #userInput:focus {
            border-color: var(--primary-color);
        }
        #sendBtn {
            margin-left: 10px;
            padding: 10px 25px;
            border: none;
            border-radius: 25px;
            background-color: var(--primary-color);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        #sendBtn:hover { background-color: #0056b3; }
        #sendBtn:disabled { background-color: #ccc; cursor: not-allowed; }

        /* Action Cards */
        .action-container {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .service-card {
            background: white;
            border: 1px solid #c3e6cb;
            border-left: 5px solid #28a745;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9em;
        }
        .service-card strong { color: #155724; display: block; margin-bottom: 4px; }
        
        .btn-action {
            display: inline-block;
            padding: 8px 16px;
            margin-top: 5px;
            background-color: #17a2b8;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.85em;
            text-align: center;
            cursor: pointer;
            border: none;
        }
        .btn-action:hover { background-color: #138496; }

        /* Loading Dots */
        .loading-dots span {
            width: 6px; height: 6px; background: #888; border-radius: 50%; display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both; margin: 0 2px;
        }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <span>🏥 Trợ lý Bệnh viện Ảo</span>
            <span id="loginStatus" class="status-indicator">🔴 Chưa đăng nhập</span>
        </div>
        <div class="chat-box" id="chatBox">
            <div class="message ai-message">
                Xin chào! Tôi là trợ lý ảo của bệnh viện. <br>
                Tôi có thể giúp bạn tra cứu giá dịch vụ, kiểm tra lịch trống hoặc tư vấn sơ bộ.<br>
                <i>Ví dụ: "Giá chụp X-quang bao nhiêu?" hoặc "Tôi muốn đặt lịch khám Nội."</i>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Nhập tin nhắn..." disabled>
            <button id="sendBtn" disabled>Gửi</button>
        </div>
    </div>

    <script>
        // --- CẤU HÌNH (SỬA LẠI NẾU CẦN) ---
        const BASE_URL = "http://127.0.0.1:8000/api"; // URL gốc của Django
        
        // TÀI KHOẢN TEST (Sẽ tạo ở bước 2)
        const TEST_USERNAME = "admin_test"; 
        const TEST_PASSWORD = "password123"; 

        let authToken = null;

        // 1. Đăng nhập tự động khi mở trang
        async function autoLogin() {
            const statusEl = document.getElementById('loginStatus');
            try {
                console.log("Đang đăng nhập...");
                const response = await fetch(`${BASE_URL}/auth/login/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: TEST_USERNAME, password: TEST_PASSWORD })
                });

                if (!response.ok) throw new Error("Sai tài khoản hoặc lỗi server");
                
                const data = await response.json();
                authToken = data.access; // JWT Token
                
                statusEl.textContent = "🟢 Đã kết nối";
                document.getElementById('userInput').disabled = false;
                document.getElementById('sendBtn').disabled = false;
                console.log("Login thành công! Token:", authToken);

            } catch (error) {
                console.error("Lỗi đăng nhập:", error);
                statusEl.textContent = "🔴 Lỗi đăng nhập";
                appendMessage("Lỗi: Không thể đăng nhập. Hãy chắc chắn bạn đã tạo tài khoản admin_test.", "ai-message");
            }
        }

        // 2. Gửi tin nhắn
        async function handleSendMessage() {
            const inputEl = document.getElementById('userInput');
            const message = inputEl.value.trim();
            if (!message) return;

            // Hiển thị tin nhắn User
            appendMessage(message, "user-message");
            inputEl.value = '';
            inputEl.disabled = true;

            // Hiển thị loading
            const loadingId = showLoading();

            try {
                const response = await fetch(`${BASE_URL}/chatbot/ask/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                removeMessage(loadingId); // Xóa loading

                if (response.ok) {
                    // Hiển thị câu trả lời của AI
                    displayAiResponse(data);
                } else {
                    appendMessage(`Lỗi: ${data.error || response.statusText}`, "ai-message");
                }

            } catch (error) {
                removeMessage(loadingId);
                appendMessage("Không thể kết nối đến Chatbot Server.", "ai-message");
                console.error(error);
            } finally {
                inputEl.disabled = false;
                inputEl.focus();
            }
        }

        // 3. Hiển thị phản hồi (Xử lý JSON đặc biệt)
        function displayAiResponse(data) {
            const container = document.createElement('div');
            container.classList.add('message', 'ai-message');

            // Phần text chính
            let htmlContent = data.answer_text.replace(/\n/g, '<br>');

            // Xử lý các suggested_actions (Nút bấm / Thẻ dịch vụ)
            if (data.suggested_actions && data.suggested_actions.length > 0) {
                htmlContent += `<div class="action-container">`;
                
                data.suggested_actions.forEach(action => {
                    if (action.type === 'VIEW_SERVICE') {
                        // Hiển thị thẻ giá
                        const keyword = action.payload.keyword || 'Dịch vụ';
                        htmlContent += `
                            <div class="service-card">
                                <strong>💡 Gợi ý Dịch vụ liên quan:</strong>
                                Đã tìm thấy thông tin về "${keyword}".
                            </div>`;
                    } 
                    else if (action.type === 'BOOK_APPOINTMENT') {
                        // Hiển thị nút đặt lịch
                        htmlContent += `
                            <button class="btn-action" onclick="alert('App sẽ chuyển hướng sang màn hình đặt lịch!')">
                                📅 ${action.label || "Đặt lịch ngay"}
                            </button>`;
                    }
                });
                htmlContent += `</div>`;
            }

            container.innerHTML = htmlContent;
            document.getElementById('chatBox').appendChild(container);
            scrollToBottom();
        }

        // --- Utils ---
        function appendMessage(text, className) {
            const div = document.createElement('div');
            div.classList.add('message', className);
            div.textContent = text;
            document.getElementById('chatBox').appendChild(div);
            scrollToBottom();
            return div;
        }

        function showLoading() {
            const id = 'msg-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.classList.add('message', 'ai-message');
            div.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
            document.getElementById('chatBox').appendChild(div);
            scrollToBottom();
            return id;
        }

        function removeMessage(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function scrollToBottom() {
            const chatBox = document.getElementById('chatBox');
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Event Listeners
        document.getElementById('sendBtn').addEventListener('click', handleSendMessage);
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSendMessage();
        });

        // Khởi chạy
        window.onload = autoLogin;
    </script>
</body>
</html>
